<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nickifyr</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --text-bright: #f0f6fc;
            --accent-color: #238636;
            --accent-hover: #2ea043;
            --accent-secondary: #1f6feb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }

        h1 {
            color: var(--text-bright);
            font-size: 24px;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        h1 svg {
            fill: var(--text-bright);
        }

        p.subtitle {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .nickname-display-container {
            position: relative;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 25px;
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nickname-display {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-bright);
            word-break: break-all;
        }

        .btn {
            background-color: var(--accent-color);
            color: var(--text-bright);
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, cubic-bezier(0.3, 0, 0.5, 1);
            margin-bottom: 12px;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--accent-secondary);
        }

        .btn-secondary:hover {
            background-color: #21262d;
            border-color: #8b949e;
        }

        /* Powiadomienie o skopiowaniu */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: var(--accent-secondary);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>
            <svg height="24" viewBox="0 0 16 16" width="24">
                <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
            </svg>
            GitNick Gen
        </h1>
        <p class="subtitle">Wygeneruj unikalny nick (Przymiotnik + Rzeczownik)</p>

        <div class="nickname-display-container">
            <div class="nickname-display" id="nickname">Kliknij Generuj!</div>
        </div>

        <button class="btn" id="generate-btn">Generuj Nick</button>
        <button class="btn btn-secondary" id="copy-btn">Kopiuj do schowka</button>
    </div>

    <div class="toast" id="toast">Skopiowano do schowka!</div>

    <script>
        // Baza słów w języku angielskim (najlepiej brzmią na GitHubie)
        const adjectives = [
            "Async", "Atomic", "Binary", "Bold", "Byte", "Clever", "Cloudy", "Cyber", 
            "Cryptic", "Dynamic", "Epic", "Fuzzy", "Glitchy", "Hyper", "Infinite", 
            "Logic", "Matrix", "Neon", "Neural", "Quantum", "Radical", "Rapid", 
            "Rusty", "Shadow", "Silent", "Sleek", "Smart", "Solar", "Sonic", "Static", 
            "Super", "Turbo", "Virtual", "Wired", "Zenith"
        ];

        const nouns = [
            "Algo", "Avatar", "Bit", "Bot", "Buffer", "Bug", "Code", "Coder", 
            "Commit", "Compiler", "Daemon", "Data", "Dev", "Docker", "Engine", 
            "Fork", "Ghost", "Git", "Glitch", "Hacker", "Kernel", "Lambda", 
            "Loop", "Matrix", "Node", "Pixel", "Python", "Script", "Shell", 
            "Stack", "Syntax", "Terminal", "Vector", "Vortex", "Wizard"
        ];

        const nicknameDisplay = document.getElementById('nickname');
        const generateBtn = document.getElementById('generate-btn');
        const copyBtn = document.getElementById('copy-btn');
        const toast = document.getElementById('toast');

        // Funkcja losująca element z tablicy
        function getRandomElement(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        // Funkcja generująca nick
        function generateNickname() {
            const adj = getRandomElement(adjectives);
            const noun = getRandomElement(nouns);
            
            // Styl zapisu: CamelCase (np. QuantumCoder)
            const nickname = adj + noun;
            
            nicknameDisplay.textContent = nickname;
        }

        // Funkcja kopiowania do schowka
        function copyToClipboard() {
            const textToCopy = nicknameDisplay.textContent;
            
            if (textToCopy === "Kliknij Generuj!") {
                return; // Nic nie rób, jeśli jeszcze nie wygenerowano nicku
            }

            navigator.clipboard.writeText(textToCopy).then(() => {
                // Pokaż powiadomienie toast
                toast.classList.add('show');
                
                // Ukryj po 2 sekundach
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }).catch(err => {
                console.error('Błąd podczas kopiowania: ', err);
            });
        }

        // Event Listeners
        generateBtn.addEventListener('click', generateNickname);
        copyBtn.addEventListener('click', copyToClipboard);

        // Wygeneruj pierwszy nick automatycznie przy załadowaniu strony
        generateNickname();
    </script>
</body>
</html>
