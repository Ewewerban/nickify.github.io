<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nickify</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-purple: #818cf8;
            --accent-cyan: #22d3ee;
            --btn-bg: linear-gradient(90deg, #6366f1 0%, #4f46e5 100%);
            --btn-hover: linear-gradient(90deg, #4f46e5 0%, #4338ca 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* Sekcja losowania pojedynczych słów */
        .generator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .word-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 120px;
        }

        .word-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .word-value {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 12px;
            word-break: break-all;
        }

        .word-value.purple { color: var(--accent-purple); }
        .word-value.cyan { color: var(--accent-cyan); }

        .btn-small {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-small:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Sekcja wyniku końcowego */
        .result-box {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .result-box:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .result-label {
            font-size: 11px;
            color: var(--accent-purple);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .result-value {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .click-to-copy {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Główny przycisk */
        .btn-main {
            background: var(--btn-bg);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-main:hover {
            background: var(--btn-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-main:active {
            transform: translateY(1px);
        }

        /* Toast Informacyjny */
        .toast {
            position: fixed;
            bottom: 30px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Generator Nicków</h1>
        <p class="subtitle">Miksuj słowa lub wylosuj całość jednym kliknięciem</p>

        <div class="generator-grid">
            <div class="word-box">
                <span class="word-label">Przymiotnik</span>
                <span class="word-value purple" id="adj-value">---</span>
                <button class="btn-small" id="rand-adj-btn">Losuj ten</button>
            </div>
            <div class="word-box">
                <span class="word-label">Rzeczownik</span>
                <span class="word-value cyan" id="noun-value">---</span>
                <button class="btn-small" id="rand-noun-btn">Losuj ten</button>
            </div>
        </div>

        <div class="result-box" id="copy-zone" title="Kliknij, aby skopiować">
            <div class="result-label">Twój Nick (Kliknij by skopiować)</div>
            <div class="result-value" id="full-nickname">---</div>
            <div class="click-to-copy">Kliknij w ramkę, aby zapisać do schowka</div>
        </div>

        <button class="btn-main" id="rand-all-btn">Losuj oba słowa</button>
    </div>

    <div class="toast" id="toast">Klip! Skopiowano do schowka!</div>

    <script>
        // Baza słów
        const adjectives = [
            "Async", "Atomic", "Binary", "Bold", "Byte", "Clever", "Cyber", 
            "Cryptic", "Dynamic", "Epic", "Fuzzy", "Glitchy", "Hyper", "Infinite", 
            "Logic", "Matrix", "Neon", "Neural", "Quantum", "Radical", "Rapid", 
            "Rusty", "Shadow", "Silent", "Sleek", "Smart", "Solar", "Sonic", "Static", 
            "Super", "Turbo", "Virtual", "Wired", "Zenith", "Alpha", "Cosmic"
        ];

        const nouns = [
            "Algo", "Avatar", "Bit", "Bot", "Buffer", "Bug", "Code", "Coder", 
            "Commit", "Compiler", "Daemon", "Data", "Dev", "Docker", "Engine", 
            "Fork", "Ghost", "Git", "Glitch", "Hacker", "Kernel", "Lambda", 
            "Loop", "Matrix", "Node", "Pixel", "Python", "Script", "Shell", 
            "Stack", "Syntax", "Terminal", "Vector", "Vortex", "Wizard", "Nexus"
        ];

        // Elementy DOM
        const adjValue = document.getElementById('adj-value');
        const nounValue = document.getElementById('noun-value');
        const fullNickname = document.getElementById('full-nickname');
        
        const randAdjBtn = document.getElementById('rand-adj-btn');
        const randNounBtn = document.getElementById('rand-noun-btn');
        const randAllBtn = document.getElementById('rand-all-btn');
        const copyZone = document.getElementById('copy-zone');
        const toast = document.getElementById('toast');

        // Funkcje losujące
        function getRandomWord(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function updateFullNickname() {
            const adj = adjValue.textContent;
            const noun = nounValue.textContent;
            
            if (adj !== "---" && noun !== "---") {
                fullNickname.textContent = adj + noun;
            } else {
                fullNickname.textContent = "---";
            }
        }

        function rollAdjective() {
            adjValue.textContent = getRandomWord(adjectives);
            updateFullNickname();
        }

        function rollNoun() {
            nounValue.textContent = getRandomWord(nouns);
            updateFullNickname();
        }

        function rollEverything() {
            adjValue.textContent = getRandomWord(adjectives);
            nounValue.textContent = getRandomWord(nouns);
            updateFullNickname();
        }

        // Kopiowanie do schowka z powiadomieniem
        function copyToClipboard() {
            const nick = fullNickname.textContent;
            if (nick === "---") return;

            navigator.clipboard.writeText(nick).then(() => {
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            });
        }

        // Event Listeners
        randAdjBtn.addEventListener('click', rollAdjective);
        randNounBtn.addEventListener('click', rollNoun);
        randAllBtn.addEventListener('click', rollEverything);
        copyZone.addEventListener('click', copyToClipboard);

        // Pierwsze losowanie na start, żeby strona nie była pusta
        rollEverything();
    </script>
</body>
</html>
